<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-white p-8">
    <h1 class="text-3xl font-bold mb-4">🐛 Debug Index Page</h1>
    
    <div id="status" class="mb-6 p-4 bg-slate-800 rounded-lg"></div>
    
    <h2 class="text-2xl font-bold mb-4">Featured Products:</h2>
    <div id="featuredProducts" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

    <script type="module">
        const status = document.getElementById('status');
        
        function log(msg, type = 'info') {
            const colors = {
                info: 'text-blue-400',
                success: 'text-green-400',
                error: 'text-red-400',
                warning: 'text-yellow-400'
            };
            status.innerHTML += `<p class="${colors[type]}">${msg}</p>`;
            console.log(msg);
        }

        try {
            log('1️⃣ Loading modules...', 'info');
            
            // Import everything
            const { collection, getDocs, limit, query } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
            const { db } = await import('./js/firebase-init.js');
            const { getProductImage } = await import('./js/product-images.js');
            
            log('✅ Modules loaded', 'success');
            log('2️⃣ Fetching products from Firestore...', 'info');
            
            const q = query(collection(db, 'products'), limit(8));
            const querySnapshot = await getDocs(q);
            
            log(`✅ Found ${querySnapshot.size} products`, 'success');
            
            if (querySnapshot.size === 0) {
                log('⚠️ NO PRODUCTS! Go to admin-upload.html', 'error');
                document.getElementById('featuredProducts').innerHTML = 
                    '<div class="col-span-full text-center py-12"><p class="text-red-400 text-xl mb-4">⚠️ No products in Firestore!</p><a href="admin-upload.html" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg inline-block">Upload Products</a></div>';
            } else {
                log('3️⃣ Rendering products...', 'info');
                
                const products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                
                const container = document.getElementById('featuredProducts');
                container.innerHTML = products.map((product, index) => {
                    const imageUrl = getProductImage(product.category.toLowerCase(), index);
                    return `
                        <div class="product-card">
                            <img src="${imageUrl}" alt="${product.name}" loading="lazy">
                            <div class="product-card-content">
                                <h3>${product.name}</h3>
                                <div class="price">$${product.price.toLocaleString()}</div>
                                <button class="w-full mt-3 px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition">
                                    Add to Cart
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                log(`✅ Rendered ${products.length} products`, 'success');
            }
            
        } catch (error) {
            log(`❌ ERROR: ${error.message}`, 'error');
            console.error('Full error:', error);
            document.getElementById('featuredProducts').innerHTML = 
                `<div class="col-span-full text-center py-12 text-red-400">
                    <p class="text-xl mb-2">❌ Error loading products</p>
                    <p class="text-sm">${error.message}</p>
                </div>`;
        }
    </script>
</body>
</html>
