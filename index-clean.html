<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media - Premium Tech Hardware Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-950 text-white">
    <!-- Navbar -->
    <nav class="navbar-glass">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-purple-500 rounded-lg"></div>
                    <span class="text-2xl font-bold text-white">Media</span>
                </a>

                <!-- Desktop Navigation -->
                <div class="hidden lg:flex items-center space-x-8">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="products.html" class="nav-link">All Products</a>
                    <a href="products.html?category=laptop" class="nav-link">PC Builder</a>
                    <a href="products.html" class="nav-link">Deals</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </div>

                <!-- Right Side -->
                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="nav-icon-btn">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <span id="cartCount" class="cart-badge">0</span>
                    </a>
                    <a href="auth.html" class="auth-btn">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-24 pb-12">
        <div class="container mx-auto px-4">
            <div class="bg-gradient-to-r from-blue-900 to-slate-900 rounded-2xl p-12 text-center">
                <h1 class="text-5xl font-bold mb-4">Welcome to Media Store</h1>
                <p class="text-xl mb-8">Premium Tech Hardware</p>
                <a href="products.html" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg inline-block">
                    Shop Now
                </a>
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <section class="py-16">
        <div class="container mx-auto px-4">
            <h2 class="text-4xl font-bold mb-8 text-center">Featured Products</h2>
            <div id="featuredProducts" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Products will load here -->
            </div>
        </div>
    </section>

    <!-- Categories -->
    <section class="py-16 bg-slate-900">
        <div class="container mx-auto px-4">
            <h2 class="text-4xl font-bold mb-8 text-center">Shop by Category</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <a href="products.html?category=laptop" class="bg-slate-800 hover:bg-slate-700 p-8 rounded-xl text-center transition">
                    <div class="text-4xl mb-4">💻</div>
                    <h3 class="text-xl font-semibold">Laptops</h3>
                </a>
                <a href="products.html?category=monitor" class="bg-slate-800 hover:bg-slate-700 p-8 rounded-xl text-center transition">
                    <div class="text-4xl mb-4">🖥️</div>
                    <h3 class="text-xl font-semibold">Monitors</h3>
                </a>
                <a href="products.html?category=keyboard" class="bg-slate-800 hover:bg-slate-700 p-8 rounded-xl text-center transition">
                    <div class="text-4xl mb-4">⌨️</div>
                    <h3 class="text-xl font-semibold">Keyboards</h3>
                </a>
                <a href="products.html?category=mouse" class="bg-slate-800 hover:bg-slate-700 p-8 rounded-xl text-center transition">
                    <div class="text-4xl mb-4">🖱️</div>
                    <h3 class="text-xl font-semibold">Mice</h3>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-slate-900 py-8 mt-16 border-t border-slate-800">
        <div class="container mx-auto px-4 text-center text-gray-400">
            <p>&copy; 2024 Media. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/home.js"></script>
</body>
</html>
