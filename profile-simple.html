<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-white">
    <!-- Navbar -->
    <nav class="navbar-glass">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent">Media</a>
                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="nav-icon-btn">🛒 <span id="cartCount" class="cart-badge">0</span></a>
                    <button id="signOutBtn" class="auth-btn">Sign Out</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Profile Content -->
    <section class="pt-24 pb-12">
        <div class="container mx-auto px-4 max-w-4xl">
            
            <!-- Profile Header -->
            <div class="bg-gradient-to-r from-blue-900/50 to-purple-900/50 rounded-2xl p-8 mb-8 backdrop-blur-sm border border-slate-800">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <img id="profilePicture" src="" alt="Profile" class="w-32 h-32 rounded-full border-4 border-blue-500 object-cover">
                    <div class="flex-1 text-center md:text-left">
                        <h1 id="displayName" class="text-3xl font-bold mb-2">Loading...</h1>
                        <p id="userEmail" class="text-gray-400 mb-4">email@example.com</p>
                        <span class="px-3 py-1 bg-green-600/20 text-green-400 rounded-full text-sm">✓ Verified</span>
                    </div>
                </div>
            </div>

            <!-- Personal Info -->
            <div class="bg-slate-900 rounded-xl p-6 border border-slate-800 mb-6">
                <h3 class="text-xl font-bold mb-4">Personal Information</h3>
                <form id="personalInfoForm" class="space-y-4">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Full Name</label>
                            <input type="text" id="fullName" class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Age</label>
                            <input type="number" id="age" class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Phone</label>
                            <input type="tel" id="phone" class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">City</label>
                            <input type="text" id="city" class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-blue-500 focus:outline-none">
                        </div>
                    </div>
                    <button type="submit" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg transition font-medium">
                        Save Changes
                    </button>
                </form>
            </div>

            <!-- Orders -->
            <div class="bg-slate-900 rounded-xl p-6 border border-slate-800">
                <h3 class="text-xl font-bold mb-4">My Orders</h3>
                <div id="ordersList">
                    <div class="text-center py-12 text-gray-400">
                        <p class="text-6xl mb-4">📦</p>
                        <p>No orders yet</p>
                        <a href="products.html" class="text-blue-400 hover:underline mt-2 inline-block">Start Shopping</a>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <script type="module">
        import { auth } from './js/firebase-init.js';
        import { onAuthStateChanged, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { updateCartCounter } from './js/main.js';

        let currentUser = null;

        // Check auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadProfile(user);
            } else {
                window.location.href = 'auth.html';
            }
        });

        function loadProfile(user) {
            document.getElementById('displayName').textContent = user.displayName || user.email.split('@')[0];
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('profilePicture').src = user.photoURL || 
                `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || user.email)}&background=3b82f6&color=fff&size=256`;
            
            // Load from localStorage
            const saved = JSON.parse(localStorage.getItem('profile_' + user.uid)) || {};
            document.getElementById('fullName').value = saved.fullName || user.displayName || '';
            document.getElementById('age').value = saved.age || '';
            document.getElementById('phone').value = saved.phone || '';
            document.getElementById('city').value = saved.city || '';
            
            // Load orders
            loadOrders(user.uid);
        }

        function loadOrders(userId) {
            const orders = JSON.parse(localStorage.getItem('orders_' + userId)) || [];
            const ordersList = document.getElementById('ordersList');
            
            if (orders.length === 0) return;
            
            ordersList.innerHTML = orders.map(order => `
                <div class="bg-slate-800 rounded-lg p-4 border border-slate-700 mb-4">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h4 class="font-semibold">Order #${order.id}</h4>
                            <p class="text-sm text-gray-400">${new Date(order.date).toLocaleDateString()}</p>
                        </div>
                        <span class="px-3 py-1 bg-yellow-600 rounded-full text-xs">Pending</span>
                    </div>
                    <div class="border-t border-slate-700 pt-3 flex justify-between font-bold">
                        <span>Total</span>
                        <span class="text-blue-400">$${order.total.toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        // Save form
        document.getElementById('personalInfoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                fullName: document.getElementById('fullName').value,
                age: document.getElementById('age').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value
            };
            
            // Save to localStorage
            localStorage.setItem('profile_' + currentUser.uid, JSON.stringify(data));
            
            // Update Firebase Auth display name
            if (data.fullName) {
                await updateProfile(currentUser, { displayName: data.fullName });
                document.getElementById('displayName').textContent = data.fullName;
            }
            
            alert('✅ Profile saved!');
        });

        // Sign out
        document.getElementById('signOutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // Update cart counter
        updateCartCounter();
    </script>
</body>
</html>
