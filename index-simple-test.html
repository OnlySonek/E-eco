<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test - Media Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-white">
    
    <!-- Simple Navbar -->
    <nav class="navbar-glass" style="display: block !important; visibility: visible !important;">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold text-white">Media Store</div>
                <div class="flex gap-6">
                    <a href="#" class="nav-link">Home</a>
                    <a href="#" class="nav-link">Products</a>
                    <a href="#" class="nav-link">Contact</a>
                </div>
                <button class="px-4 py-2 bg-blue-600 rounded-lg text-white">Login</button>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <section class="pt-24 pb-12">
        <div class="container mx-auto px-4">
            <div class="bg-slate-900 p-8 rounded-xl">
                <h1 class="text-4xl font-bold mb-4">🧪 Simple Test Page</h1>
                <p class="text-xl mb-4">This is a simplified version to test if navbar appears.</p>
                
                <div class="space-y-4">
                    <div class="bg-slate-800 p-4 rounded">
                        <h3 class="font-bold mb-2">✅ Checklist:</h3>
                        <ul class="space-y-2">
                            <li id="check1" class="text-red-400">❌ Navbar visible</li>
                            <li id="check2" class="text-red-400">❌ CSS loaded</li>
                            <li id="check3" class="text-red-400">❌ Tailwind working</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Check if navbar is visible
        const navbar = document.querySelector('.navbar-glass');
        if (navbar) {
            const styles = window.getComputedStyle(navbar);
            console.log('Navbar found!');
            console.log('Display:', styles.display);
            console.log('Position:', styles.position);
            console.log('Z-index:', styles.zIndex);
            console.log('Background:', styles.background);
            
            if (styles.display !== 'none') {
                document.getElementById('check1').innerHTML = '✅ Navbar visible';
                document.getElementById('check1').className = 'text-green-400';
            }
        }
        
        // Check CSS
        if (navbar && window.getComputedStyle(navbar).position === 'fixed') {
            document.getElementById('check2').innerHTML = '✅ CSS loaded';
            document.getElementById('check2').className = 'text-green-400';
        }
        
        // Check Tailwind
        const body = document.body;
        if (window.getComputedStyle(body).backgroundColor) {
            document.getElementById('check3').innerHTML = '✅ Tailwind working';
            document.getElementById('check3').className = 'text-green-400';
        }
    </script>
</body>
</html>
