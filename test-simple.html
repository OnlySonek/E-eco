<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test</title>
</head>
<body style="background: #0f172a; color: white; padding: 20px; font-family: monospace;">
    <h1>🔍 Firebase Test</h1>
    <div id="log"></div>

    <script type="module">
        const log = document.getElementById('log');
        
        function addLog(msg, color = 'white') {
            log.innerHTML += `<p style="color: ${color}; margin: 5px 0;">${msg}</p>`;
            console.log(msg);
        }

        try {
            addLog('1️⃣ Starting test...', 'yellow');
            
            // Test 1: Import Firebase
            addLog('2️⃣ Importing Firebase...', 'yellow');
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
            const { getFirestore, collection, getDocs, limit, query } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
            addLog('✅ Firebase imported', 'lime');
            
            // Test 2: Import config
            addLog('3️⃣ Importing config...', 'yellow');
            const { firebaseConfig } = await import('./js/config.js');
            addLog('✅ Config imported', 'lime');
            addLog(`   Project: ${firebaseConfig.projectId}`, 'cyan');
            
            // Test 3: Initialize
            addLog('4️⃣ Initializing Firebase...', 'yellow');
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            addLog('✅ Firebase initialized', 'lime');
            
            // Test 4: Fetch products
            addLog('5️⃣ Fetching products...', 'yellow');
            const q = query(collection(db, 'products'), limit(5));
            const snapshot = await getDocs(q);
            addLog(`✅ Found ${snapshot.size} products`, 'lime');
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                addLog(`   📦 ${data.name} - $${data.price}`, 'cyan');
            });
            
            if (snapshot.size === 0) {
                addLog('⚠️ NO PRODUCTS IN FIRESTORE!', 'red');
                addLog('👉 Go to admin-upload.html and upload products', 'orange');
            }
            
        } catch (error) {
            addLog(`❌ ERROR: ${error.message}`, 'red');
            addLog(`   ${error.stack}`, 'gray');
        }
    </script>
</body>
</html>
