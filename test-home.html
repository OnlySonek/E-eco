<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Home - Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-8">
    <h1 class="text-3xl font-bold mb-4">🔍 Debug Test - Home Page</h1>
    
    <div id="status" class="mb-4 p-4 bg-slate-800 rounded">
        <p>⏳ Initializing...</p>
    </div>
    
    <div id="products" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>

    <script type="module">
        import { collection, getDocs, limit, query } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { db } from './js/firebase-init.js';
        import { getProductImage } from './js/product-images.js';

        const status = document.getElementById('status');
        const productsDiv = document.getElementById('products');

        async function test() {
            try {
                status.innerHTML = '<p class="text-yellow-400">📡 Connecting to Firestore...</p>';
                
                const q = query(collection(db, 'products'), limit(8));
                const querySnapshot = await getDocs(q);
                
                status.innerHTML = `<p class="text-green-400">✅ Connected! Found ${querySnapshot.size} products</p>`;
                
                let products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                
                console.log('Products:', products);
                
                if (products.length === 0) {
                    productsDiv.innerHTML = '<p class="text-red-400 col-span-full">⚠️ No products found in Firestore!</p>';
                } else {
                    productsDiv.innerHTML = products.map((p, i) => {
                        const img = getProductImage(p.category.toLowerCase(), i);
                        return `
                            <div class="bg-slate-800 p-4 rounded">
                                <img src="${img}" alt="${p.name}" class="w-full h-48 object-cover rounded mb-2">
                                <h3 class="font-bold">${p.name}</h3>
                                <p class="text-blue-400">$${p.price}</p>
                                <p class="text-sm text-gray-400">${p.category}</p>
                            </div>
                        `;
                    }).join('');
                }
                
            } catch (error) {
                status.innerHTML = `<p class="text-red-400">❌ Error: ${error.message}</p>`;
                console.error('Full error:', error);
            }
        }

        test();
    </script>
</body>
</html>
